services:
  postgres:
    image: postgres:17
    container_name: codeflow-local
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: localuser
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: codeflow-local
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: